<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Effects</title>

    <style>

        @keyframes glow {
            from{opacity: 0.2; background: whitesmoke;}
            to{opacity: 1; background: white; }
        }

        @keyframes switch {
            0%{
                /* top: 0; */
                /* left: 0; */
                margin-top: 0;
                margin-left: 0;
            }
            25%{
                /* text-align: center; */
                /* top: 0; */
                /* right: 200px; */
                margin-top: 0;
                margin-left: 200px;
                background: red;
                /* transform: rotate(360deg); */
            }
            50%{
                /* top: 200px; */
                /* left: 200px; */
                margin-top: 200px;
                margin-left: 200px;
                background: yellow;
                /* transform: rotate(360deg); */

            }
            75%{
                /* left: 0; */
                /* top: 200px; */
                margin-top: 200px;
                margin-left: 0;
                background: green;
            }
            100%{
                /* top: 0; */
                /* left: 0; */
                display: flex;
                align-items: center;
                background: whitesmoke;
                border: 5px solid white;
                transform: rotate(270deg);
            }
        }

        div{
            width: 100px;
            height: 100px;
            background: black;
            animation: glow 3s linear infinite alternate, switch 10s linear 1s 2 normal forwards running;
            border-radius: 50%;
            /* position: absolute; */
            /* top: 0; */
            /* right: 0; */
            /* bottom: ; */
            /* left: ; */
        }

        body{
            background: black;
            width: 100%;
        }
    </style>

</head>
<body>
    

    <div></div>

</body>
</html>
