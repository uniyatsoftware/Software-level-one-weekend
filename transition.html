<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transition Effects</title>

    <style>
        div{
            width: 100px;
            height: 100px; 
            background: red;

            transition-property: background, height, width, transform;
            transition-duration: 3s, 5s, 2s, 4s;
            transition-timing-function: ease-in, linear, ease-in-out, cubic-bezier(.04, .1, 1.0, 0);
            transition-delay: 1s;

            &:hover{
                /* transform: rotate(360deg); */
                transform: translateY(300px);
                height: 300px;
                width: 300px;
                background: green;
            }
        }
    </style>

</head>   
<body>
    

    <div></div>
</body>
</html>
